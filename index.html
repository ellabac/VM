<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VM-Tippning 2026</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    @font-face { font-family:'Brown'; src:local('Brown'),local('BrownPro'),local('Brown Pro'); font-weight:400; }
    @font-face { font-family:'Brown'; src:local('Brown-Bold'),local('BrownPro-Bold'); font-weight:700; }

    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }

    :root {
      --blue:      #9EB9D4;
      --blue-lt:   #C8D9E8;
      --blue-pale: #E8F0F7;
      --blue-dk:   #6E9ABF;
      --blue-deep: #3D6A8A;
      --bg:        #F0F5F9;
      --white:     #FFFFFF;
      --text:      #1A2B38;
      --muted:     #6A8A9E;
      --correct:   #4A8C6A;
      --correct-bg:#D4EDE1;
      --wrong:     #B0B8BE;
      --wrong-bg:  #EAEEF1;
      --gold:      #C9A84C;
      --silver:    #8A9BA8;
      --bronze:    #B87A5A;
      --line:      #BDD0E0;
    }

    body {
      font-family:'Brown','Gill Sans','Trebuchet MS',system-ui,sans-serif;
      background:var(--bg); color:var(--text);
      font-size:14px; line-height:1.5;
    }

    /* ── HEADER ── */
    header {
      background:var(--blue);
      padding:48px 32px 40px;
      text-align:center; position:relative;
    }
    header h1 {
      font-size:2.2rem; font-weight:700;
      letter-spacing:.07em; text-transform:uppercase; color:#fff;
    }
    header p { color:rgba(255,255,255,.7); margin-top:6px; font-size:.9rem; letter-spacing:.04em; }

    /* ── MAIN ── */
    main { max-width:1160px; margin:0 auto; padding:40px 24px 80px; }

    .section-title {
      font-size:.68rem; font-weight:700;
      letter-spacing:.13em; text-transform:uppercase;
      color:var(--muted); margin-bottom:16px;
    }

    /* ── LEADERBOARD ── */
    .leaderboard {
      background:var(--white); border-radius:12px;
      overflow:hidden; margin-bottom:48px;
      box-shadow:0 1px 4px rgba(0,0,0,.06);
    }
    .lb-row {
      display:flex; align-items:center;
      padding:16px 24px; gap:14px;
      border-bottom:1px solid var(--bg);
      transition:background .12s;
    }
    .lb-row:hover { background:var(--bg); }
    .lb-row { cursor:pointer; }
    .lb-item:last-child .lb-row { border-bottom:none; }
    .rank {
      width:26px; height:26px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-size:.75rem; font-weight:700; flex-shrink:0;
    }
    .r1{background:var(--gold);color:#fff;}
    .r2{background:var(--silver);color:#fff;}
    .r3{background:var(--bronze);color:#fff;}
    .r4{background:var(--bg);color:var(--muted);}
    .lb-name { flex:1; font-weight:700; font-size:.95rem; }
    .lb-tags { display:flex; gap:6px; flex-wrap:wrap; }
    .lb-tag {
      font-size:.68rem; padding:2px 8px;
      border-radius:20px; background:var(--bg); color:var(--muted);
    }
    .lb-pts { font-size:1.5rem; font-weight:700; color:var(--blue-deep); }
    .lb-pts span { font-size:.72rem; font-weight:400; color:var(--muted); margin-left:2px; }

    /* ── EXPANDABLE TIPPNING (per leaderboard row) ── */
    .lb-item { background:var(--white); }

    .bracket-chevron {
      width:18px; height:18px; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      color:var(--muted); transition:transform .2s;
    }
    .lb-item.open .bracket-chevron { transform:rotate(180deg); color:var(--blue-deep); }

    .bracket-wrap {
      padding:18px 24px 22px; overflow-x:auto;
      display:none;
      background:var(--blue-pale);
    }
    .lb-item.open .bracket-wrap { display:block; }

    /* ── THE BRACKET ── */
    .bracket {
      display:flex;
      align-items:stretch;
      min-width:540px;
    }

    /* Each round column */
    .b-col {
      display:flex;
      flex-direction:column;
    }
    .b-col-header {
      font-size:.62rem; font-weight:700;
      letter-spacing:.1em; text-transform:uppercase;
      color:var(--muted); text-align:center;
      padding-bottom:10px; margin-bottom:4px;
      border-bottom:1px solid var(--blue-pale);
      flex-shrink:0;
    }
    .b-col-body {
      flex:1;
      display:flex;
      flex-direction:column;
    }

    /* Sizes */
    .col-qf    { flex:1.6; }
    .col-sf    { flex:1.4; }
    .col-final { flex:1.3; }
    .col-win   { flex:1; }

    /* A match = two team slots */
    .b-match {
      flex:1;
      display:flex;
      flex-direction:column;
      position:relative;
      padding-right:22px; /* space for connector */
    }
    /* no connector on last col */
    .col-win .b-match { padding-right:0; }

    .b-match::after { display:none; }

    /* A slot = one team within a match */
    .b-slot {
      flex:1;
      display:flex;
      align-items:center;
      padding:4px 0;
    }

    /* Team pill */
    .b-pill {
      display:flex; align-items:center; gap:7px;
      padding:6px 11px; border-radius:7px;
      font-size:.82rem; width:100%;
      transition:background .12s;
    }
    .b-pill.unknown  { background:var(--blue-pale); color:var(--text); }
    .b-pill.correct  { background:var(--correct-bg); color:#2a6045; font-weight:600; }
    .b-pill.wrong    { background:var(--wrong-bg); color:var(--wrong); }
    .b-pill.champion { background:var(--gold); color:#fff; font-weight:700;
                       box-shadow:0 2px 8px rgba(201,168,76,.3); }

    .b-dot {
      width:7px; height:7px; border-radius:50%; flex-shrink:0;
    }
    .unknown  .b-dot { background:var(--blue); }
    .correct  .b-dot { background:var(--correct); }
    .wrong    .b-dot { background:var(--wrong); }
    .champion .b-dot { background:rgba(255,255,255,.7); }

    .b-name { flex:1; }

    /* Points tags on pill */
    .b-pts {
      font-size:.7rem; font-weight:700; flex-shrink:0;
      white-space:nowrap;
    }
    .correct .b-pts, .champion .b-pts { color:inherit; opacity:.85; }
    .wrong   .b-pts  { color:var(--wrong); }
    .unknown .b-pts  { color:var(--blue-dk); }

    /* 3rd place label */
    .b-third {
      font-size:.62rem; font-weight:700;
      letter-spacing:.08em; text-transform:uppercase;
      color:var(--bronze); margin-left:2px; flex-shrink:0;
    }
  </style>
</head>
<body>

<header>
  <h1>VM-Tippning 2026</h1>
  <p>Hejsan allihopa, här kan ni se vem som leder årets tippning och vad alla har tippat! /Ella</p>
</header>

<main>
  <div class="section-title">Ställning</div>
  <div class="leaderboard" id="leaderboard"></div>
</main>

<script>
// ── PARTICIPANTS — loaded from tippningar.xlsx ────────────────────────────────
let participants = {};

async function loadExcel() {
  const res = await fetch('tippningar.xlsx');
  if (!res.ok) throw new Error('Kunde inte ladda tippningar.xlsx');
  const buf = await res.arrayBuffer();
  const wb  = XLSX.read(buf, { type: 'array', cellStyles: true });
  const ws  = wb.Sheets[wb.SheetNames[0]];

  const range = XLSX.utils.decode_range(ws['!ref']);

  // Helper: get cell value as trimmed string
const val = (r, c) => {
    const cell = ws[XLSX.utils.encode_cell({ r, c })];
    return (cell && cell.v !== undefined && cell.v !== null) ? cell.v.toString().trim() : '';
  };

  // Helper: is cell bold?
  const bold = (r, c) => {
    const cell = ws[XLSX.utils.encode_cell({ r, c })];
    return !!(cell && cell.s && cell.s.font && cell.s.font.bold);
  };

  // Find person columns — any non-empty cell in row 0 except col 0 (which is the label column)
  participants = {};
  for (let c = 1; c <= range.e.c; c++) {
    const name = val(0, c);
    if (!name) continue;

    const semi0   = val(5, c);
    const semi1   = val(6, c);
    const third   = bold(5, c) ? semi0 : bold(6, c) ? semi1 : null;
    const quarter = [8, 9, 10, 11].map(r => val(r, c)).filter(Boolean);

    participants[name] = {
      winner:  val(1, c),
      second:  val(3, c),
      third,
      semi:    [semi0, semi1].filter(Boolean),
      quarter
    };
  }
}

// ── RESULTS — loaded from Resultat.xlsx ───────────────────────────────────────
let results = { winner:"", second:"", third:"", final:[], semi:[], quarter:[] };

async function loadResultsExcel() {
  const res = await fetch('Resultat.xlsx');
  if (!res.ok) throw new Error('Kunde inte ladda Resultat.xlsx');
  const buf = await res.arrayBuffer();
  const wb  = XLSX.read(buf, { type: 'array', cellStyles: true });
  const ws  = wb.Sheets[wb.SheetNames[0]];

  // Helper: get raw cell value as trimmed string (column B = index 1)
  const raw = r => {
    const cell = ws[XLSX.utils.encode_cell({ r, c: 1 })];
    return (cell && cell.v !== undefined && cell.v !== null) ? cell.v.toString().trim() : '';
  };
  // "x" is just a placeholder for "not filled in yet" — treat it as blank
  const val = r => { const v = raw(r); return v.toLowerCase() === 'x' ? '' : v; };

  // Layout: Vinnare=row1, Tvåa=row3, Final=rows5-6 (2), Trea=row8,
  // Semi=rows10-11 (2, the two semifinal losers), Kvart=rows15-22 (8)
  const winner  = val(1);
  const second  = val(3);
  const final   = [5, 6].map(val).filter(Boolean);
  const third   = val(8);
  const semi    = [10, 11].map(val).filter(Boolean);
  const quarter = [15, 16, 17, 18, 19, 20, 21, 22].map(val).filter(Boolean);

  results = { winner, second, third, final, semi, quarter };
}

const norm = s => (s||"").trim().toLowerCase();

function hasResults() {
  return !!(results.winner || results.second || results.third
            || results.final.length || results.semi.length || results.quarter.length);
}

// Stage points a team actually earned: QF=1, SF=2, Final=3
// A team's presence in a later-stage list (semi/final/winner/second) already implies
// it passed through the earlier stages, so we just union everything at each level.
function stagePoints(team) {
  const t = norm(team); if (!t) return 0;
  const r = results;
  const finSet = new Set([r.winner, r.second, ...r.final].filter(Boolean).map(norm));
  const sfSet  = new Set([r.winner, r.second, ...r.final, ...r.semi].filter(Boolean).map(norm));
  const qfSet  = new Set([r.winner, r.second, ...r.final, ...r.semi, ...r.quarter].filter(Boolean).map(norm));
  if (finSet.has(t)) return 3;
  if (sfSet.has(t))  return 2;
  if (qfSet.has(t))  return 1;
  return 0;
}

// Per-round slot state: did this team actually make it TO this round?
function slotState(team, minStage) {
  if (!hasResults()) return "unknown";
  return stagePoints(team) >= minStage ? "correct" : "wrong";
}

// ── SCORING ───────────────────────────────────────────────────────────────────
// Every tipped team earns 1p per round advanced (QF, SF, Final = max 3p).
// Bonus: +2p correct winner, +1p correct 2nd, +1p correct 3rd.
function scoreParticipant(p) {
  const allTipped = [p.winner, p.second, p.third, ...p.semi, ...p.quarter].filter(Boolean);
  let stagePts = 0;
  allTipped.forEach(t => stagePts += stagePoints(t));

  let bonusPts = 0;
  const r = results;
  if (r.winner && norm(p.winner) === norm(r.winner)) bonusPts += 2;
  if (r.second && norm(p.second) === norm(r.second)) bonusPts += 1;
  if (r.third  && norm(p.third)  === norm(r.third))  bonusPts += 1;

  return { pts: stagePts + bonusPts, stagePts, bonusPts };
}

// ── LEADERBOARD ───────────────────────────────────────────────────────────────
function renderLeaderboard() {
  const scores = Object.entries(participants).map(([name, p]) => {
    const { pts, stagePts, bonusPts } = scoreParticipant(p);
    return { name, pts, stagePts, bonusPts };
  }).sort((a,b) => b.pts - a.pts);

  // Dense ranking: equal point totals share the same position, and the next
  // distinct total takes the very next position (no gaps for ties).
  let rank = 0, lastPts = null;
  scores.forEach(s => {
    if (lastPts === null || s.pts !== lastPts) { rank += 1; lastPts = s.pts; }
    s.rank = rank;
  });

  document.getElementById("leaderboard").innerHTML = scores.map(s => {
    const rc = ["r1","r2","r3","r4"][Math.min(s.rank-1,3)];
    const tags = [
      s.stagePts ? `${s.stagePts}p rond`    : "",
      s.bonusPts ? `+${s.bonusPts}p bonus`  : "",
    ].filter(Boolean).map(t => `<span class="lb-tag">${t}</span>`).join("");
    return `<div class="lb-item" id="card-${s.name}">
      <div class="lb-row" onclick="toggleCard('${s.name}')">
        <div class="rank ${rc}">${s.rank}</div>
        <div class="lb-name">${s.name}</div>
        <div class="lb-tags">${tags}</div>
        <div class="lb-pts">${s.pts}<span>p</span></div>
        <div class="bracket-chevron">
          <svg width="12" height="8" viewBox="0 0 12 8" fill="none">
            <path d="M1 1l5 5 5-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
      ${bracketInner(s.name, participants[s.name])}
    </div>`;
  }).join("");
}

// ── BRACKET (TIPPNING) RENDERER ────────────────────────────────────────────────
// Bracket arrangement (arbitrary but consistent pairings):
//
// QF match 1: semi[0]  vs quarter[0]   → semi[0] advances
// QF match 2: winner   vs quarter[1]   → winner  advances
// QF match 3: semi[1]  vs quarter[2]   → semi[1] advances
// QF match 4: second   vs quarter[3]   → second  advances
//
// SF match 1: semi[0]  vs winner        → winner  advances (semi[0] = potential 3rd)
// SF match 2: semi[1]  vs second        → second  advances (semi[1] = potential 3rd)
//
// Final:      winner   vs second        → winner  wins
// Winner:     winner

function pill(team, minStage, extraClass, ptsStr) {
  const state = hasResults() ? slotState(team, minStage) : "unknown";
  const cls   = extraClass || state;
  const pts   = (hasResults() && ptsStr) ? `<span class="b-pts">${ptsStr}</span>` : "";
  return `<div class="b-pill ${cls}">
    <div class="b-dot"></div>
    <span class="b-name">${team}</span>${pts}
  </div>`;
}

function semipill(team, thirdPick, minStage, ptsStr, bonusStr) {
  const state    = hasResults() ? slotState(team, minStage) : "unknown";
  const isThird  = norm(team) === norm(thirdPick);
  const thirdLbl = isThird ? `<span class="b-third">3:a</span>` : "";
  const pts      = (hasResults() && ptsStr)  ? `<span class="b-pts">${ptsStr}</span>`  : "";
  const bonus    = (hasResults() && bonusStr) ? `<span class="b-pts">${bonusStr}</span>` : "";
  return `<div class="b-pill ${state}">
    <div class="b-dot"></div>
    <span class="b-name">${team}</span>${thirdLbl}${pts}${bonus}
  </div>`;
}

function slot(innerHTML) {
  return `<div class="b-slot">${innerHTML}</div>`;
}

function match(...slots) {
  return `<div class="b-match">${slots.join("")}</div>`;
}

function bracketInner(name, p) {
  const r       = results;
  const isR     = hasResults();

  // Points for display (only when results are set)
  const sp = t => isR ? stagePoints(t) : null;
  const ptsLabel = (t, extraBonus) => {
    if (!isR) return "";
    const s = sp(t);
    const bonus = extraBonus || 0;
    const total = s + bonus;
    return total > 0 ? `+${total}p` : "";
  };

  // Bonus checks
  const winnerBonus  = (isR && norm(p.winner) === norm(r.winner) && r.winner) ? 2 : 0;
  const secondBonus  = (isR && norm(p.second) === norm(r.second) && r.second) ? 1 : 0;
  const thirdBonus   = (isR && norm(p.third)  === norm(r.third)  && r.third)  ? 1 : 0;

  // Which semi is 3rd pick?
  const thirdIsS0 = norm(p.semi[0]) === norm(p.third);

  // Stage pts for each team's exit point
  const s0bonus = thirdIsS0 ? thirdBonus : 0;
  const s1bonus = !thirdIsS0 ? thirdBonus : 0;

  // ── BUILD COLUMNS ──

  // QF column (4 matches, 8 teams)
  const qfCol = `
    <div class="b-col col-qf">
      <div class="b-col-header">Kvartsfinaler</div>
      <div class="b-col-body">
        ${match(
          slot(pill(p.semi[0],  1, "", "")),
          slot(pill(p.quarter[0], 1, "", isR ? (sp(p.quarter[0]) > 0 ? `+${sp(p.quarter[0])}p` : "") : ""))
        )}
        ${match(
          slot(pill(p.winner,   1, "", "")),
          slot(pill(p.quarter[1], 1, "", isR ? (sp(p.quarter[1]) > 0 ? `+${sp(p.quarter[1])}p` : "") : ""))
        )}
        ${match(
          slot(pill(p.semi[1],  1, "", "")),
          slot(pill(p.quarter[2], 1, "", isR ? (sp(p.quarter[2]) > 0 ? `+${sp(p.quarter[2])}p` : "") : ""))
        )}
        ${match(
          slot(pill(p.second,   1, "", "")),
          slot(pill(p.quarter[3], 1, "", isR ? (sp(p.quarter[3]) > 0 ? `+${sp(p.quarter[3])}p` : "") : ""))
        )}
      </div>
    </div>`;

  // SF column (2 matches, 4 teams)
  // Each SF match spans 2 QF matches in height (flex:1 on each match aligns them)
  const sfCol = `
    <div class="b-col col-sf">
      <div class="b-col-header">Semifinaler</div>
      <div class="b-col-body">
        ${match(
          slot(pill(p.winner,  2, "", "")),
          slot(semipill(p.semi[0], p.third, 2,
                isR ? (sp(p.semi[0]) > 0 ? `+${sp(p.semi[0])}p` : "") : "",
                s0bonus ? `+${s0bonus}p bonus` : ""))
        )}
        ${match(
          slot(pill(p.second,  2, "", "")),
          slot(semipill(p.semi[1], p.third, 2,
                isR ? (sp(p.semi[1]) > 0 ? `+${sp(p.semi[1])}p` : "") : "",
                s1bonus ? `+${s1bonus}p bonus` : ""))
        )}
      </div>
    </div>`;

  // Final column (1 match, 2 teams)
  const winLabel  = ptsLabel(p.winner, winnerBonus);
  const secLabel  = ptsLabel(p.second, secondBonus);
  const winState  = !isR ? "unknown" : slotState(p.winner, 3);
  const secState  = !isR ? "unknown" : slotState(p.second, 3);

  const finalCol = `
    <div class="b-col col-final">
      <div class="b-col-header">Final</div>
      <div class="b-col-body">
        ${match(
          slot(`<div class="b-pill ${winState}"><div class="b-dot"></div><span class="b-name">${p.winner}</span>${winLabel ? `<span class="b-pts">${winLabel}</span>` : ""}</div>`),
          slot(`<div class="b-pill ${secState}"><div class="b-dot"></div><span class="b-name">${p.second}</span>${secLabel ? `<span class="b-pts">${secLabel}</span>` : ""}</div>`)
        )}
      </div>
    </div>`;

  // Winner column (1 team, centred)
  const champState = !isR ? "unknown"
    : (norm(p.winner) === norm(r.winner) && r.winner) ? "champion"
    : slotState(p.winner, 3) === "correct" ? "correct" : "wrong";

  const winnerCol = `
    <div class="b-col col-win">
      <div class="b-col-header">Vinnare</div>
      <div class="b-col-body">
        <div class="b-match">
          <div class="b-slot" style="flex:1"></div>
          <div class="b-slot" style="flex:0 0 auto; padding:4px 0;">
            <div class="b-pill ${champState}">
              <div class="b-dot"></div>
              <span class="b-name">${p.winner}</span>
            </div>
          </div>
          <div class="b-slot" style="flex:1"></div>
        </div>
      </div>
    </div>`;

  return `
    <div class="bracket-wrap">
      <div class="bracket">
        ${qfCol}${sfCol}${finalCol}${winnerCol}
      </div>
    </div>`;
}

function toggleCard(name) {
  document.getElementById(`card-${name}`).classList.toggle("open");
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init() {
  document.getElementById('leaderboard').innerHTML =
    '<div style="padding:20px 24px;color:var(--muted);font-size:.9rem;">Laddar...</div>';
  try {
    await loadExcel();
  } catch(e) {
    document.getElementById('leaderboard').innerHTML =
      `<div style="padding:20px 24px;color:#c0392b;font-size:.9rem;">
        Kunde inte ladda tippningar.xlsx — kontrollera att filen finns i samma mapp.
      </div>`;
    return;
  }
  try {
    await loadResultsExcel();
  } catch(e) {
    // Resultat.xlsx saknas eller är tom — det är okej, då visas tippningarna utan facit än.
    console.warn('Kunde inte ladda Resultat.xlsx:', e);
  }
  renderLeaderboard();
}
init();
</script>
</body>
</html>
